<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Her Road Life Simulator</title>
    <style>
        /* Retro Game Font & Grainy Aesthetic */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'VT323', monospace;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
            /* Vintage CRT/Grain effect hint */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
        }

        /* Game Container Layout */
        .game-container {
            width: 100%;
            max-width: 960px;
            height: 600px;
            background-color: #1a1a1a;
            border: 4px solid #ffffff;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Left Side: Avatar Panel */
        .avatar-panel {
            width: 35%;
            border-right: 4px solid #ffffff;
            background-color: #262626;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .avatar-box {
            width: 140px;
            height: 140px;
            border: 4px dashed #888888;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background-color: #121212;
        }

        /* Simple CSS Retro Pixel Art Character representation */
        .pixel-girl {
            width: 60px;
            height: 90px;
            background: #ffffff;
            position: relative;
            clip-path: polygon(30% 0%, 70% 0%, 85% 20%, 85% 40%, 70% 50%, 90% 55%, 100% 80%, 75% 80%, 75% 100%, 25% 100%, 25% 80%, 0% 80%, 10% 55%, 30% 50%, 15% 40%, 15% 20%);
        }

        .avatar-name {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .avatar-meta {
            font-size: 20px;
            color: #aaaaaa;
        }

        /* Right Side: Main Text & Control Panel */
        .main-panel {
            width: 65%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            background-color: #151515;
        }

        .story-section {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .page-title {
            font-size: 32px;
            color: #ffffff;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 2px solid #444;
            padding-bottom: 5px;
        }

        .story-text {
            line-height: 1.4;
            color: #cccccc;
            min-height: 100px;
            white-space: pre-line;
        }

        /* Interactive Controls */
        .controls-section {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Bubble Style Choice Buttons */
        .btn-choice {
            background-color: #222222;
            color: #ffffff;
            border: 3px solid #ffffff;
            border-radius: 30px;
            padding: 12px 24px;
            font-family: 'VT323', monospace;
            font-size: 24px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0px #555555;
            width: 100%;
        }

        .btn-choice:hover {
            background-color: #ffffff;
            color: #121212;
            box-shadow: 3px 3px 0px #888888;
            transform: translate(-1px, -1px);
        }

        .btn-choice:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px;
        }

        /* System Action Bar (Back / Reset) */
        .system-bar {
            display: flex;
            justify-content: flex-end;
            border-top: 2px dashed #444444;
            padding-top: 10px;
        }

        .btn-system {
            background: none;
            border: 2px solid #888888;
            color: #888888;
            padding: 4px 12px;
            font-family: 'VT323', monospace;
            font-size: 18px;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-system:hover:not(:disabled) {
            color: #ffffff;
            border-color: #ffffff;
        }

        .btn-system:disabled {
            color: #444444;
            border-color: #444444;
            cursor: not-allowed;
        }

        /* Custom Scrollbar for Retro feel */
        .story-section::-webkit-scrollbar {
            width: 8px;
        }
        .story-section::-webkit-scrollbar-track {
            background: #151515;
        }
        .story-section::-webkit-scrollbar-thumb {
            background: #444444;
            border: 1px solid #ffffff;
        }

        /* Responsive Layout Adaptive Handling */
        @media (max-width: 768px) {
            body {
                font-size: 20px;
            }
            .game-container {
                flex-direction: column;
                height: auto;
                min-height: 90vh;
            }
            .avatar-panel {
                width: 100%;
                border-right: none;
                border-bottom: 4px solid #ffffff;
                flex-direction: row;
                gap: 20px;
                padding: 15px;
                justify-content: flex-start;
            }
            .avatar-box {
                width: 70px;
                height: 70px;
                margin-bottom: 0;
            }
            .pixel-girl {
                width: 30px;
                height: 45px;
            }
            .main-panel {
                width: 100%;
                height: 500px;
            }
            .page-title {
                font-size: 26px;
            }
            .btn-choice {
                font-size: 20px;
                padding: 8px 18px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="avatar-panel">
            <div class="avatar-box">
                <div class="pixel-girl"></div>
            </div>
            <div>
                <div class="avatar-name">小春幸始</div>
                <div class="avatar-meta">Gender: Female</div>
                <div class="avatar-meta" style="font-size: 16px; color:#666; margin-top:5px;">Born in Japan</div>
            </div>
        </div>

        <div class="main-panel">
            <div class="story-section">
                <div class="page-title" id="pageTitle">Loading...</div>
                <div class="story-text" id="storyText"></div>
            </div>

            <div class="controls-section">
                <div class="options-container" id="optionsContainer">
                </div>

                <div class="system-bar">
                    <button class="btn-system" id="backBtn" onclick="goBack()" disabled>◀ RETURN TO PREVIOUS STEP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Complete Data Matrix mapped out from the dynamic simulation system paths
        const gameData = {
            1: {
                title: "In This Life, You Are Born in Japan",
                text: "This life is for you to choose and write. Every step you take will confront the real predicament of Japanese women.",
                choices: [
                    { text: "Begin your journey", target: 2 }
                ]
            },
            2: {
                title: "Years of Hard Study Pay Off",
                text: "You are admitted to the University of Tokyo!\n\nPutting in the same amount of effort to obtain the qualification for further education, but this is merely the beginning of the tests in life.",
                choices: [
                    { text: "Proceed to Graduation", target: 3 }
                ]
            },
            3: {
                title: "Standing at the Crossroads of Life",
                text: "Graduating from a prestigious university with two excellent job offers, facing a career choice dilemma.",
                choices: [
                    { text: "Option A: Join a government department", target: 4 },
                    { text: "Option B: Enter a private enterprise", target: 5 }
                ]
            },
            4: {
                title: "Government Workplace",
                text: "You chose the system, thinking you could have a stable life.\n\nBut after entering, you find that stability does not equal fairness. The proportion of female members of the Japanese Diet is extremely low.\n\nThe proportion of female members of the Japanese Diet is only 15.7% (2025), far below the global average of 26.8% (United Nations, 2025), ranking last among developed countries.",
                choices: [
                    { text: "Continue to workplace realities", target: 6 }
                ]
            },
            5: {
                title: "Corporate Workplace",
                text: "You enter a company and become an ordinary employee.\n\nYou do your best to prove yourself. Even though you are highly competent at work, you are still prematurely set a career ceiling due to your gender.",
                choices: [
                    { text: "Continue to workplace realities", target: 6 }
                ]
            },
            6: {
                title: "Gender Labels, Becoming Invisible Shackles",
                text: "You find that no matter whether in politics or the workplace, women encounter differential treatment.\n\nGender Equality Bureau, Cabinet Office of Japan (2025): In political settings, only 14.4% responded that they were treated equally, and in the workplace, the proportion of those responding that they were treated equally was only 30.7%.",
                choices: [
                    { text: "Move forward to your post-marriage years", target: 7 }
                ]
            },
            7: {
                title: "Post-marriage Decisions",
                text: "After getting a job, you, like most women, enter into marriage. At this point, you face a major test in life. You encounter difficulties with having children after marriage, and are under pressure from both family expectations and career development. At this time, you have to choose:",
                choices: [
                    { text: "Option A: Choose to have children", target: 8 },
                    { text: "Option B: Choose not to have children", target: 9 }
                ]
            },
            8: {
                title: "Post-Birth Choices",
                text: "You have chosen to have a child. One year later, a new life arrives.\n\nAfter the maternity leave ends, you need to decide the direction of your future life. You are once again faced with choices.",
                choices: [
                    { text: "Option A: Exit the workplace", target: 10 },
                    { text: "Option B: Return to the workplace", target: 11 }
                ]
            },
            9: {
                title: "The Cost of Not Having Children",
                text: "You chose not to have children, but were labeled as \"selfish\".\n\nUnder the pressure of unpaid household chores (United Nations, 2021) and intense work stress, you chose to give up having children.\n\nIn a society with severe aging problems in Japan, the behavior of your not having children continued to exert pressure on you. You deviated from the established life path and were classified as an abnormal outlier within the group, with nowhere to hide.",
                choices: [
                    { text: "View Epilogue Summary", target: 12 }
                ]
            },
            10: {
                title: "Outcome: Leaving the Workplace",
                text: "You choose to go home to take care of your children, and from then on, the door to the workplace is closed to you.\n\nDue to the significant inadequacy of the husband's responsibility for child-rearing (Miyajima & Yamaguchi, 2017) and the default division of labor in society, you are forced to give up your career and become a full-time mother. Eventually, due to the lack of an income source, you fall into a vicious cycle of undertaking a large amount of unpaid household chores.\n\nYour entire life is trapped in the confined space of the home.",
                choices: [
                    { text: "View Epilogue Summary", target: 12 }
                ]
            },
            11: {
                title: "Conclusion: Returning to Work after Pregnancy",
                text: "You struggled to return to work, but found yourself trapped in the Japanese M-shaped employment dilemma.\n\nYou stepped back into your former workplace, only to discover that all your previous experience had become useless and you couldn't obtain the core positions.\n\nThe vast majority of women who returned to work at the second peak of the M-shaped curve (i.e., after giving birth) were directed towards unstable, low-paying, informal or part-time jobs. (Inoue et al., 2016)",
                choices: [
                    { text: "View Epilogue Summary", target: 12 }
                ]
            },
            12: {
                title: "Epilogue: SDG5 - Eliminating Gender Discrimination",
                text: "You find that no matter which path you take, you encounter numerous difficulties. This is not your fault; it is a problem of the system.\n\nEvery path you take hides the same predicament: biases and restrictions brought about by gender.\n\nThe purpose of SDG5 is to eliminate all discrimination against women and empower women, allowing every woman to be free from gender limitations and have the right to control their own lives.",
                choices: [
                    { text: "Restart Simulation ↺", target: 1 }
                ]
            }
        };

        let historyStack = [];
        let currentPage = 1;
        let timer = null;

        function renderPage(pageId) {
            currentPage = pageId;
            const data = gameData[pageId];
            
            // Set Page Title
            document.getElementById('pageTitle').innerText = `Page ${pageId} - ${data.title}`;
            
            // Typewriter Text Effect Configuration
            const textContainer = document.getElementById('storyText');
            clearInterval(timer);
            textContainer.innerText = '';
            
            let index = 0;
            // Immediate rendering if the text structure is long or running frequently
            timer = setInterval(() => {
                if (index < data.text.length) {
                    textContainer.innerText += data.text.charAt(index);
                    index++;
                } else {
                    clearInterval(timer);
                }
            }, 5); // 5ms processing rate mimics retro speed blocks

            // Dynamic Action Interface Options Rendering
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            data.choices.forEach(choice => {
                const button = document.createElement('button');
                button.className = 'btn-choice';
                button.innerText = choice.text;
                button.onclick = () => selectOption(choice.target);
                optionsContainer.appendChild(button);
            });

            // Update System Navigation state 
            document.getElementById('backBtn').disabled = historyStack.length === 0;
        }

        function selectOption(targetPageId) {
            // Push history logic exceptions clear on restart loop configuration tracking
            if (currentPage === 12 && targetPageId === 1) {
                historyStack = [];
            } else {
                historyStack.push(currentPage);
            }
            renderPage(targetPageId);
        }

        function goBack() {
            if (historyStack.length > 0) {
                const prevPage = historyStack.pop();
                renderPage(prevPage);
            }
        }

        // Initialize simulation execution runtime entry
        window.onload = () => {
            renderPage(1);
        };
    </script>
</body>
</html>
